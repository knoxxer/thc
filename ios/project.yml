name: THC
options:
  bundleIdPrefix: com.thc
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Shared_iOS:
    type: framework
    platform: iOS
    sources:
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thc.shared
        PRODUCT_NAME: Shared
        GENERATE_INFOPLIST_FILE: YES

  Shared_watchOS:
    type: framework
    platform: watchOS
    sources:
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thc.shared
        PRODUCT_NAME: Shared
        GENERATE_INFOPLIST_FILE: YES

  THC:
    type: application
    platform: iOS
    sources:
      - path: THC
    dependencies:
      - target: Shared_iOS
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thc.app
        INFOPLIST_FILE: THC/Info.plist

  THCWatch:
    type: application
    platform: watchOS
    sources:
      - path: THCWatch
    dependencies:
      - target: Shared_watchOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thc.app.watchkitapp

  THCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: THCTests
        excludes:
          - "GPXSimulation/**"
    dependencies:
      - target: THC
      - target: Shared_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thc.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/THC.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/THC"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  THC:
    build:
      targets:
        THC: all
        THCTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - THCTests

  THCWatch:
    build:
      targets:
        THCWatch: all
    run:
      config: Debug

  THCTests:
    build:
      targets:
        THCTests: [test]
        THC: [test]
    test:
      config: Debug
      targets:
        - THCTests
