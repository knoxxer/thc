name: iOS Tests

on:
  push:
    paths:
      - 'ios/**'
  pull_request:
    paths:
      - 'ios/**'

env:
  XCODE_VERSION: '16.2'

jobs:
  unit-and-service-tests:
    name: Unit & Service Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run unit + service tests
        run: |
          xcodebuild test \
            -project ios/THC.xcodeproj \
            -scheme THCTests \
            -testPlan UnitAndService \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            -resultBundlePath TestResults/unit.xcresult \
            -quiet

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/unit.xcresult

  gps-simulation-tests:
    name: GPS Simulation Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run GPX simulation tests
        run: |
          xcodebuild test \
            -project ios/THC.xcodeproj \
            -scheme THCUITests \
            -testPlan GPXSimulation \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            -resultBundlePath TestResults/gps.xcresult \
            -quiet

      - name: Upload GPS simulation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gps-simulation-test-results
          path: TestResults/gps.xcresult
